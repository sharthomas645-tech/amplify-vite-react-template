<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Borealis HybridAI Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-page">
        <h1>Login</h1>
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <div class="dashboard">
        <nav class="dashboard-navigation">
            <ul>
                <li><a href="#metrics">Metrics</a></li>
                <li><a href="#case-management">Case Management</a></li>
                <li><a href="#timeline">Chronology Timeline</a></li>
            </ul>
        </nav>
        <div class="metrics-bar">
            <!-- Metrics content goes here -->
        </div>
        <div class="case-management-panel">
            <h2>Case Management</h2>
            <div class="filters">
                <!-- Filters go here -->
            </div>
            <button>Upload PDF</button>
            <button>Build Chronology</button>
            <button>RN Review Request</button>
            <button>Export File</button>
        </div>
        <div class="chronology-timeline">
            <!-- Chronology timeline content goes here -->
        </div>
        <div class="api-configuration-modal">
            <!-- API Configuration Modal Content -->
        </div>
        <div class="toast-notifications">
            <!-- Toast notifications go here -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
