<!DOCTYPE html>
<html>
<head>
<title>HybridAI Dashboard</title>
<style>
body{
margin:0;
font-family:"Segoe UI",sans-serif;
overflow:hidden;
background:#020617;
color:white;
}

/* Aurora canvas */
#auroraCanvas {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* Header */
.header{
text-align:center;
padding-top:40px;
}
.logoText{
font-size:60px;
font-weight:700;
background:linear-gradient(90deg,#4cc9f0,#7209b7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 35px rgba(100,160,255,.9);
}
.subtitle{
font-size:24px;
opacity:.85;
margin-top:10px;
}

/* Panel */
.panel{
max-width:1100px;
margin:40px auto;
background:rgba(255,255,255,.05);
padding:40px;
border-radius:20px;
backdrop-filter:blur(18px);
box-shadow:0 15px 50px rgba(0,0,0,.6);
}

/* Buttons */
.button-row{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:40px;
}
button{
flex:1;
padding:18px;
min-width:150px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:600;
cursor:pointer;
background:linear-gradient(90deg,#4361ee,#7209b7);
color:white;
box-shadow:0 0 15px rgba(120,120,255,.5);
transition:.3s;
}
button:hover{
transform:translateY(-2px);
box-shadow:0 0 30px rgba(150,130,255,1);
}

/* Cards */
.cards{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
}
.card{
background:rgba(255,255,255,.05);
padding:30px;
border-radius:15px;
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(76,201,240,0.25);
text-align:center;
}
.card h3{
font-size:24px;
color:#9fb7ff;
margin-bottom:20px;
}
.status span{
display:block;
padding:10px;
margin:8px 0;
border-radius:8px;
font-size:18px;
color:#8fb6ff;
}
.active{
background:linear-gradient(90deg,#4361ee,#7209b7);
color:white;
box-shadow:0 0 15px rgba(130,130,255,.9);
}
.metric{
font-size:50px;
font-weight:700;
text-align:center;
margin-top:10px;
}
.alert{
color:#ff4d6d;
}
</style>
</head>
<body>

<canvas id="auroraCanvas"></canvas>

<!-- Optional water sound -->
<audio id="waterSound" autoplay loop>
<source src="soft_water.mp3" type="audio/mpeg">
</audio>

<div class="header">
<div class="logoText">HybridAI</div>
<div class="subtitle">Medical Chronology Builder & Analyzer</div>
</div>

<div class="panel">
<div class="button-row">
<button id="uploadBtn">Upload PDF</button>
<button id="buildChronBtn">Build Chronology</button>
<button id="rnReviewBtn">RN Review Request</button>
<button id="exportBtn">Export Files</button>
</div>

<div class="cards">
<div class="card">
<h3>Case Status</h3>
<div class="status">
<span class="active">Uploaded</span>
<span>Processing</span>
<span>Under RN Review</span>
<span>Ready for Export</span>
</div>
</div>

<div class="card">
<h3>High-Risk Alerts</h3>
<div class="metric alert" id="highRisk">2</div>
</div>

<div class="card">
<h3>Cases Uploaded</h3>
<div class="metric" id="casesUploaded">5</div>
</div>
</div>
</div>

<script>
// ===== Aurora Canvas =====
const canvas = document.getElementById("auroraCanvas");
const ctx = canvas.getContext("2d");
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

// Aurora ribbons
const ribbons = [];
const colors = [
'rgba(114,9,183,0.25)', // purple
'rgba(76,201,240,0.25)', // blue
'rgba(0,255,204,0.25)' // green
];
for(let i=0;i<12;i++){
ribbons.push({
x: Math.random()*width,
y: Math.random()*height*0.5,
amplitude: 80+Math.random()*40,
wavelength: 200+Math.random()*200,
speed: 0.0005 + Math.random()*0.0005,
color: colors[i%colors.length],
offset: Math.random()*Math.PI*2
});
}

function drawAuroras(){
ctx.clearRect(0,0,width,height);
ribbons.forEach(r => {
ctx.beginPath();
for(let x=0;x<width;x+=2){
let y = r.y + Math.sin((x/r.wavelength)+r.offset + Date.now()*r.speed)*r.amplitude;
ctx.lineTo(x,y);
}
ctx.strokeStyle = r.color;
ctx.lineWidth = 60;
ctx.shadowBlur = 50;
ctx.shadowColor = r.color;
ctx.stroke();
ctx.shadowBlur = 0;
});
requestAnimationFrame(drawAuroras);
}
drawAuroras();

window.addEventListener('resize', ()=>{
width = canvas.width = window.innerWidth;
height = canvas.height = window.innerHeight;
});

// ===== Buttons logic =====
let uploadedCases = 5;
const waterAudio = document.getElementById('waterSound');
waterAudio.volume = 0.15;

function handleClick(action){
waterAudio.volume = 0.2;
setTimeout(()=>waterAudio.volume = 0.15,800);
switch(action){
case 'upload':
uploadedCases++;
document.getElementById('casesUploaded').innerText = uploadedCases;
alert('PDF uploaded! Total: '+uploadedCases);
break;
case 'chron':
alert('Chronology built!');
break;
case 'rn':
alert('RN Review Request sent!');
break;
case 'export':
alert('Files ready for export!');
break;
}
}

['uploadBtn','buildChronBtn','rnReviewBtn','exportBtn'].forEach(id=>{
document.getElementById(id).addEventListener('click', ()=>{
handleClick(id);
});
});
</script>
</body>
</html>
