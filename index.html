<script>
// =======================
// Aurora Ribbons (calm)
// =======================
const canvas = document.getElementById("auroraCanvas");
const ctx = canvas.getContext("2d");
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

class Ribbon {
constructor(colors, baseY, amplitude, speed, offsetX=0, freq=0.015){
this.colors = colors;
this.baseY = baseY;
this.amplitude = amplitude;
this.baseAmplitude = amplitude;
this.speed = speed;
this.offset = Math.random()*1000;
this.offsetX = offsetX;
this.freq = freq;
this.phaseShift = Math.random()*Math.PI*2;
}
draw(time){
const grad = ctx.createLinearGradient(0,0,0,height);
grad.addColorStop(0,this.colors[0]);
grad.addColorStop(0.5,this.colors[1]);
grad.addColorStop(1,this.colors[2]);

ctx.beginPath();
for(let x=0;x<=width;x+=2){
let y = this.baseY +
Math.sin((x*this.freq + time*this.speed + this.offset) + this.phaseShift)*this.amplitude +
Math.sin((x*(this.freq*1.5) + time*this.speed*0.8))*this.amplitude*0.25 +
Math.cos((x*(this.freq*0.5) + time*this.speed*0.4))*this.amplitude*0.15;
if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
}
ctx.lineTo(width,height);
ctx.lineTo(0,height);
ctx.closePath();
ctx.fillStyle = grad;
ctx.shadowBlur = 130;
ctx.shadowColor = this.colors[1];
ctx.fill();
ctx.shadowBlur = 0;
}
pulse(strength=15){
this.amplitude=this.baseAmplitude+strength;
setTimeout(()=>{this.amplitude=this.baseAmplitude;},300);
}
}

const ribbons = [
new Ribbon(["rgba(178,102,255,0.55)","rgba(153,102,255,0.5)","rgba(102,204,255,0.35)"], height*0.25, 35, 0.00045, 0, 0.016),
new Ribbon(["rgba(204,153,255,0.5)","rgba(178,102,255,0.45)","rgba(51,255,204,0.32)"], height*0.35, 40, 0.00025, 200, 0.014),
new Ribbon(["rgba(153,102,255,0.48)","rgba(102,153,255,0.4)","rgba(0,255,255,0.3)"], height*0.45, 38, 0.00035, 500, 0.015),
new Ribbon(["rgba(153,102,204,0.45)","rgba(102,102,255,0.38)","rgba(51,255,255,0.3)"], height*0.55, 42, 0.0005, 800, 0.017),
new Ribbon(["rgba(102,102,255,0.42)","rgba(51,153,255,0.36)","rgba(102,255,204,0.28)"], height*0.65, 40, 0.0004, 1000, 0.013)
];

function animate(time=0){
ctx.clearRect(0,0,width,height);
ribbons.forEach(r=>r.draw(time));
requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize',()=>{
width = canvas.width = window.innerWidth;
height = canvas.height = window.innerHeight;
ribbons.forEach((r,i)=>{
r.baseY = height*0.2 + i*height*0.1;
r.amplitude = 35 + i*3;
r.offsetX = i*300;
});
});

// =======================
// API Endpoints
// =======================
const apiEndpoints = {
upload: "https://vicwyv5xoi.execute-api.us-west-2.amazonaws.com/prod/upload",
buildChron: "https://huy6splpn3.execute-api.us-west-2.amazonaws.com/prod/build",
export: "https://g4r3dpjiu9.execute-api.us-west-2.amazonaws.com/prod/export",
rn: "https://rolkt59qj4.execute-api.us-west-2.amazonaws.com/prod/rn"
};

// =======================
// Status & Metrics
// =======================
let uploadedCases = 5;
const statusSpans = document.querySelectorAll('.status span');
let currentStatusIndex = 0;
function updateStatus(index){
statusSpans.forEach((span,i)=>span.classList.toggle('active',i===index));
}

async function updateHighRiskAlerts(){
try {
const response = await fetch("/api/highRiskCount");
const result = await response.json();
if(result.success) document.getElementById('highRisk').innerText=result.count;
} catch(err){ console.error("Error fetching High-Risk Alerts:",err); }
}
updateHighRiskAlerts();

// =======================
// Ocean & Subtitle Pulse
// =======================
const oceanSound = document.getElementById('oceanSound');
oceanSound.volume = 0.7;
document.addEventListener('click', ()=>{ oceanSound.play().catch(()=>{}); });

function pulseSound(strength=0.1,duration=400){
const original = oceanSound.volume;
oceanSound.volume = Math.min(1, original+strength);
setTimeout(()=>{ oceanSound.volume=original; },duration);
}

const subtitle = document.getElementById('subtitleText');
function pulseSubtitle(){
subtitle.classList.add('pulse');
setTimeout(()=>subtitle.classList.remove('pulse'),300);
}

// =======================
// File Upload
// =======================
const fileInput=document.getElementById('fileInput');
fileInput.addEventListener('change', async(event)=>{
const file = event.target.files[0];
if(!file) return;

try{
const arrayBuffer = await file.arrayBuffer();
const base64 = btoa(new Uint8Array(arrayBuffer).reduce((data,byte)=>data+String.fromCharCode(byte),""));
const payload = { fileName:file.name, fileContentBase64:base64 };

const response = await fetch(apiEndpoints.upload, {
method:"PUT",
headers: {
"Content-Type":"application/json"
},
body: JSON.stringify(payload)
});

const result = await response.json();

if(result.firmId && result.caseId && result.fileId){
uploadedCases++;
document.getElementById('casesUploaded').innerText=uploadedCases;
currentStatusIndex=0; updateStatus(currentStatusIndex);
alert(`PDF uploaded successfully: ${file.name}`);
ribbons.forEach(r=>r.pulse());
pulseSubtitle();
pulseSound(0.15,500);
updateHighRiskAlerts();
} else alert(`Upload failed: ${result.error || "Unknown error"}`);
} catch(err){ console.error(err); alert("Error uploading PDF."); }
});

document.getElementById('uploadBtn').addEventListener('click',()=>fileInput.click());

// =======================
// Build Chronology
// =======================
async function callBuildChronology(){
try{
currentStatusIndex=1; updateStatus(currentStatusIndex);
const response = await fetch(apiEndpoints.buildChron, {method:"POST", headers:{"Content-Type":"application/json"}});
const result = await response.json();
if(result.success){
alert("Chronology built successfully!");
ribbons.forEach(r=>r.pulse()); pulseSubtitle(); pulseSound(0.15,500);
updateHighRiskAlerts();
} else alert("Error: "+result.message);
} catch(err){ console.error(err); alert("Error calling Build Chronology API."); }
}
document.getElementById('buildChronBtn').addEventListener('click', callBuildChronology);

// =======================
// RN Review
// =======================
async function callRNReview(){
try{
currentStatusIndex=2; updateStatus(currentStatusIndex);
const response = await fetch(apiEndpoints.rn, {method:"POST", headers:{"Content-Type":"application/json"}});
const result = await response.json();
if(result.success){
alert("RN Review request sent!");
ribbons.forEach(r=>r.pulse()); pulseSubtitle(); pulseSound(0.15,500);
} else alert("Error: "+result.message);
} catch(err){ console.error(err); alert("Error calling RN Review API."); }
}
document.getElementById('rnReviewBtn').addEventListener('click', callRNReview);

// =======================
// Export Files
// =======================
async function callExport(){
try{
currentStatusIndex=3; updateStatus(currentStatusIndex);
const response = await fetch(apiEndpoints.export, {
method:"POST",
headers: { "Content-Type":"application/json" }
});
const blob = await response.blob();
const url = window.URL.createObjectURL(blob);
const a = document.createElement("a"); a.href = url; a.download = "exported_files.zip";
document.body.appendChild(a); a.click(); a.remove();
ribbons.forEach(r=>r.pulse()); pulseSubtitle(); pulseSound(0.15,500);
} catch(err){ console.error(err); alert("Error exporting files."); }
}
document.getElementById('exportBtn').addEventListener('click', callExport);
</script>
