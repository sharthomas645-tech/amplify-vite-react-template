<!DOCTYPE html>
<html>
<head>
<title>HybridAI Dashboard</title>
<style>
body{
margin:0;
font-family:"Segoe UI",sans-serif;
overflow:hidden;
background:#020617;
color:white;
}
#auroraCanvas {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* Animated HybridAI Logo */
@keyframes logoGradient {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}
.logoText{
font-size:60px;
font-weight:700;
background: linear-gradient(270deg, #7209b7, #4361ee, #4cc9f0, #00ff99);
background-size: 800% 800%;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
text-shadow: 0 0 35px rgba(100,160,255,0.9);
animation: logoGradient 15s ease infinite;
}

.header{
text-align:center;
padding-top:40px;
}
.subtitle{
font-size:24px;
opacity:.85;
margin-top:10px;
}

/* Panel */
.panel{
max-width:1100px;
margin:40px auto;
background:rgba(255,255,255,.08);
padding:40px;
border-radius:20px;
backdrop-filter:blur(12px);
box-shadow:0 15px 50px rgba(0,0,0,.6);
}

/* Buttons */
.button-row{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:40px;
}
button{
flex:1;
padding:18px;
min-width:150px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:600;
cursor:pointer;
background:linear-gradient(90deg,#4361ee,#7209b7);
color:white;
box-shadow:0 0 15px rgba(120,120,255,.5);
transition:.3s;
}
button:hover{
transform:translateY(-2px);
box-shadow:0 0 30px rgba(150,130,255,1);
}

/* Cards */
.cards{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
}
.card{
background:rgba(255,255,255,.08);
padding:30px;
border-radius:15px;
backdrop-filter:blur(12px);
box-shadow:0 0 35px rgba(76,201,240,0.45);
text-align:center;
transition:0.3s;
}
.card h3{
font-size:24px;
color:#b3c9ff;
text-shadow:0 0 10px rgba(120,150,255,0.6);
margin-bottom:20px;
}
.status span{
display:block;
padding:10px;
margin:8px 0;
border-radius:8px;
font-size:18px;
color:#dbe9ff;
opacity:0.85;
transition:.3s;
text-shadow:0 0 6px rgba(180,200,255,0.5);
}
.active{
background:linear-gradient(90deg,#7209b7,#4361ee,#4cc9f0);
color:#ffffff;
box-shadow:0 0 25px rgba(120,120,255,0.9);
opacity:1;
text-shadow:0 0 20px rgba(255,255,255,0.7);
}
.metric{
font-size:50px;
font-weight:700;
text-align:center;
margin-top:10px;
color:#dbe9ff;
text-shadow:0 0 15px rgba(120,150,255,0.4);
}
/* Highlight Needs Attention */
.subtext{
font-size:20px;
font-weight:600;
color:#ff4d6d;
text-shadow:0 0 12px rgba(255,80,100,0.7);
margin-top:8px;
}
</style>
</head>
<body>

<input type="file" id="fileInput" accept=".pdf" style="display:none">

<canvas id="auroraCanvas"></canvas>

<audio id="oceanSound" autoplay loop>
<source src="soft_ocean_waves.mp3" type="audio/mpeg">
Your browser does not support the audio element.
</audio>

<div class="header">
<div class="logoText">HybridAI</div>
<div class="subtitle">Medical Chronology Builder & Analyzer</div>
</div>

<div class="panel">
<div class="button-row">
<button id="uploadBtn">Upload PDF</button>
<button id="buildChronBtn">Build Chronology</button>
<button id="rnReviewBtn">RN Review Request</button>
<button id="exportBtn">Export Files</button>
</div>
<div class="cards">
<div class="card">
<h3>Case Status</h3>
<div class="status">
<span class="active">Uploaded</span>
<span>Processing</span>
<span>RN Request In Progress</span>
<span>Ready for Export</span>
</div>
</div>
<div class="card">
<h3>High-Risk Alerts Detected</h3>
<div class="metric alert" id="highRisk">0</div>
<div class="subtext">Needs Attention</div>
</div>
<div class="card">
<h3>Cases Uploaded</h3>
<div class="metric" id="casesUploaded">5</div>
</div>
</div>
</div>

<script>
// ---------- Aurora Ribbons ----------
const canvas=document.getElementById("auroraCanvas");
const ctx=canvas.getContext("2d");
let width=canvas.width=window.innerWidth;
let height=canvas.height=window.innerHeight;

class Ribbon{
constructor(color, amplitude, speed, offsetX=0){
this.color=color;
this.amplitude=amplitude;
this.baseAmplitude=amplitude;
this.speed=speed;
this.offset=Math.random()*1000;
this.offsetX=offsetX;
}
draw(time){
let amp=this.amplitude;
ctx.beginPath();
ctx.moveTo(0,height/2);
for(let x=0;x<=width;x+=2){
let y=height/2 + Math.sin((x+this.offsetX)*0.01 + time*this.speed + this.offset)*amp;
ctx.lineTo(x,y);
}
ctx.lineTo(width,height);
ctx.lineTo(0,height);
ctx.closePath();
ctx.fillStyle=this.color;
ctx.shadowBlur=100; ctx.shadowColor=this.color;
ctx.fill(); ctx.shadowBlur=0;
}
pulse(strength=15){
this.amplitude=this.baseAmplitude+strength;
setTimeout(()=>{this.amplitude=this.baseAmplitude;},300);
}
}

// Ribbons spaced apart and flowing at different speeds
const ribbons=[
new Ribbon("rgba(114,9,183,0.4)",50,0.00045,0),
new Ribbon("rgba(67,97,238,0.38)",60,0.00025,300),
new Ribbon("rgba(76,201,240,0.3)",55,0.00035,600),
new Ribbon("rgba(114,9,183,0.25)",70,0.0005,900)
];

function animate(time=0){
ctx.clearRect(0,0,width,height);
ribbons.forEach(r=>r.draw(time));
requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', ()=>{ width=canvas.width=window.innerWidth; height=canvas.height=window.innerHeight; });

// ---------- Case Status ----------
let uploadedCases=5;
const statusSpans=document.querySelectorAll('.status span');
let currentStatusIndex=0;
function updateStatus(index){ statusSpans.forEach((span,i)=>span.classList.toggle('active',i===index)); }

// ---------- API Endpoints ----------
const apiEndpoints={
upload:"AttorneyUploadAPI",
buildChron:"BuildChronologyAPI",
rn:"RNVerificationRequestAPI",
export:"ExportCaseChronologyAPI",
highRiskCount:"/api/highRiskCount"
};

// ---------- File Upload ----------
const fileInput=document.getElementById('fileInput');
const oceanSound=document.getElementById('oceanSound');
oceanSound.volume=0.15;

fileInput.addEventListener('change',async(event)=>{
const file=event.target.files[0];
if(!file) return;
try{
const formData=new FormData(); formData.append("pdf",file);
const response=await fetch(apiEndpoints.upload,{method:"POST",body:formData});
const result=await response.json();
if(result.success){
uploadedCases++; document.getElementById('casesUploaded').innerText=uploadedCases;
currentStatusIndex=0; updateStatus(currentStatusIndex);
alert(`PDF uploaded: ${file.name}`);
ribbons.forEach(r=>r.pulse());
oceanSound.volume=0.25; setTimeout(()=>oceanSound.volume=0.15,500);
updateHighRiskAlerts();
} else { alert(`Upload failed: ${result.message}`); }
} catch(err){ console.error(err); alert("Error uploading PDF."); }
});

// ---------- Build Chronology ----------
async function callBuildChronology(){
try{
currentStatusIndex=1; updateStatus(currentStatusIndex);
const response=await fetch(apiEndpoints.buildChron,{method:"POST"});
const result=await response.json();
if(result.success){
alert("Chronology built successfully!");
ribbons.forEach(r=>r.pulse());
oceanSound.volume=0.25; setTimeout(()=>oceanSound.volume=0.15,500);
updateHighRiskAlerts();
} else { alert("Error: "+result.message); }
} catch(err){ console.error(err); alert("Error calling API."); }
}

// ---------- RN Verification ----------
async function callRNReview(){
try{
currentStatusIndex=2; updateStatus(currentStatusIndex);
const response=await fetch(apiEndpoints.rn,{method:"POST"});
const result=await response.json();
if(result.success){
alert("RN Review request sent!");
ribbons.forEach(r=>r.pulse());
oceanSound.volume=0.25; setTimeout(()=>oceanSound.volume=0.15,500);
} else { alert("Error: "+result.message); }
} catch(err){ console.error(err); alert("Error calling API."); }
}

// ---------- Export ----------
async function callExport(){
try{
currentStatusIndex=3; updateStatus(currentStatusIndex);
const response=await fetch(apiEndpoints.export);
const blob=await response.blob();
const url=window.URL.createObjectURL(blob);
const a=document.createElement("a"); a.href=url; a.download="exported_files.zip";
document.body.appendChild(a); a.click(); a.remove();
ribbons.forEach(r=>r.pulse());
oceanSound.volume=0.25; setTimeout(()=>oceanSound.volume=0.15,500);
} catch(err){ console.error(err); alert("Error exporting files."); }
}

// ---------- High-Risk Alerts ----------
async function updateHighRiskAlerts(){
try{
const response=await fetch(apiEndpoints.highRiskCount);
const result=await response.json();
if(result.success) document.getElementById('highRisk').innerText=result.count;
else console.error("Failed fetching High-Risk Alerts:",result.message);
} catch(err){ console.error("Error fetching High-Risk Alerts:",err); }
}
updateHighRiskAlerts();

// ---------- Button Hooks ----------
document.getElementById('uploadBtn').addEventListener('click',()=>fileInput.click());
document.getElementById('buildChronBtn').addEventListener('click',callBuildChronology);
document.getElementById('rnReviewBtn').addEventListener('click',callRNReview);
document.getElementById('exportBtn').addEventListener('click',callExport);
</script>

</body>
</html>
