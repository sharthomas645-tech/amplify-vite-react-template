<!DOCTYPE html>
<html>
<head>
<title>HybridAI Dashboard</title>
<style>
body{
margin:0;
font-family:"Segoe UI",sans-serif;
overflow:hidden;
background:#020617;
color:white;
}

/* Aurora Canvas */
#auroraCanvas {
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
z-index:-1;
}

/* Logo */
@keyframes logoGradient {0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.logoText{
font-size:60px;
font-weight:700;
background: linear-gradient(270deg,#7209b7,#4361ee,#4cc9f0,#00ff99);
background-size: 800% 800%;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
text-shadow: 0 0 40px rgba(100,160,255,1);
animation: logoGradient 15s ease infinite;
text-align:center;
}

/* Subtitle */
@keyframes subtitleGradient {0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.subtitle{
font-size:24px;
opacity:.9;
margin-top:10px;
background: linear-gradient(270deg,#4361ee,#7209b7,#4cc9f0,#00ff99);
background-size: 800% 800%;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
animation: subtitleGradient 25s ease infinite;
transition: transform 0.3s ease, text-shadow 0.3s ease;
text-align:center;
}
.subtitle.pulse{transform: scale(1.1); text-shadow:0 0 25px rgba(255,255,255,1);}
.subtitle2{
font-size:24px;
font-weight:bold;
margin-top:6px;
background: linear-gradient(270deg,#7209b7,#4361ee,#4cc9f0,#00ff99);
background-size: 800% 800%;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
animation: subtitleGradient 20s ease infinite;
text-align:center;
}

/* Panel */
.panel{
max-width:1100px;
margin:40px auto;
background:rgba(255,255,255,.08);
padding:40px;
border-radius:20px;
backdrop-filter:blur(12px);
box-shadow:0 15px 50px rgba(0,0,0,.6);
position: relative;
z-index:1;
}

/* Buttons */
.button-row{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:40px;
}
button{
flex:1;
padding:18px;
min-width:150px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:600;
cursor:pointer;
background:linear-gradient(90deg,#4361ee,#7209b7);
color:white;
box-shadow:0 0 20px rgba(120,120,255,.7);
transition:.3s;
}
button:hover{transform:translateY(-2px); box-shadow:0 0 35px rgba(150,130,255,1);}

/* Cards */
.cards{display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px;}
.card{
background: rgba(255,255,255,.08);
padding:30px;
border-radius:15px;
backdrop-filter:blur(12px);
box-shadow:0 0 35px rgba(76,201,240,0.45);
text-align:center;
transition:0.3s;
z-index:1;
}
.card h3{
font-size:24px;
color:#e0f8ff;
text-shadow:0 0 12px rgba(150,180,255,0.9);
margin-bottom:20px;
}
.status span{
display:block;
padding:10px;
margin:8px 0;
border-radius:8px;
font-size:18px;
color:#f0f8ff;
opacity:0.95;
transition:.3s;
text-shadow:0 0 8px rgba(180,200,255,0.7);
}
.active{
background:linear-gradient(90deg,#7209b7,#4361ee,#4cc9f0);
color:#ffffff;
box-shadow:0 0 25px rgba(120,120,255,0.9);
opacity:1;
text-shadow:0 0 20px rgba(255,255,255,0.8);
}
.metric{
font-size:50px;
font-weight:700;
text-align:center;
margin-top:10px;
color:#e0f8ff;
text-shadow:0 0 18px rgba(120,150,255,0.7);
}
/* Needs Attention Soft Yellow */
.subtext{
font-size:20px;
font-weight:600;
color:#fff9a3;
text-shadow:0 0 14px rgba(255,240,163,0.8);
margin-top:8px;
}

/* Upload Status Message */
.upload-status {
display: none;
margin-top: 20px;
padding: 15px;
border-radius: 8px;
text-align: center;
font-weight: 600;
}
.upload-status.show {
display: block;
}
.upload-status.success {
background: rgba(0, 255, 100, 0.2);
color: #00ff64;
}
.upload-status.error {
background: rgba(255, 50, 50, 0.2);
color: #ff3232;
}
.upload-status.loading {
background: rgba(100, 160, 255, 0.2);
color: #64a0ff;
}
</style>
</head>
<body>

<input type="file" id="fileInput" accept=".pdf" style="display:none">

<canvas id="auroraCanvas"></canvas>

<audio id="oceanSound" autoplay loop>
<source src="soft_ocean_waves.mp3" type="audio/mpeg">
</audio>

<div class="header">
<div class="logoText">HybridAI</div>
<div class="subtitle" id="subtitleText">Medical Chronology Builder & Analyzer</div>
<div class="subtitle2">We Make It Make Sense</div>
</div>

<div class="panel">
<div class="button-row">
<button id="uploadBtn">Click to Upload PDF</button>
<button id="buildChronBtn">Build Chronology</button>
<button id="rnReviewBtn">RN Review Request</button>
<button id="exportBtn">Export Files</button>
</div>
<div id="uploadStatus" class="upload-status"></div>
<div class="cards">
<div class="card">
<h3>Case Status</h3>
<div class="status">
<span class="active">Uploaded</span>
<span>Processing</span>
<span>RN Request In Progress</span>
<span>Ready for Export</span>
</div>
</div>
<div class="card">
<h3>High-Risk Alerts Detected</h3>
<div class="metric alert" id="highRisk">0</div>
<div class="subtext">Needs Attention</div>
</div>
<div class="card">
<h3>Cases Uploaded</h3>
<div class="metric" id="casesUploaded">5</div>
</div>
</div>
</div>

<script>
// ---------------- Aurora ----------------
const canvas = document.getElementById("auroraCanvas");
const ctx = canvas.getContext("2d");
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

class Ribbon {
constructor(colors, baseY, amplitude, speed, offsetX=0, freq=0.015){
this.colors = colors; this.baseY = baseY; this.amplitude = amplitude;
this.baseAmplitude = amplitude; this.speed = speed; this.offset = Math.random()*1000;
this.offsetX = offsetX; this.freq = freq; this.phaseShift = Math.random()*Math.PI*2;
}
draw(time){
const grad = ctx.createLinearGradient(0,0,0,height);
grad.addColorStop(0,this.colors[0]); grad.addColorStop(0.5,this.colors[1]); grad.addColorStop(1,this.colors[2]);
ctx.beginPath();
for(let x=0;x<=width;x+=2){
let y = this.baseY +
Math.sin((x*this.freq + time*this.speed + this.offset) + this.phaseShift)*this.amplitude +
Math.sin((x*(this.freq*1.5) + time*this.speed*0.8))*this.amplitude*0.25 +
Math.cos((x*(this.freq*0.5) + time*this.speed*0.4))*this.amplitude*0.15;
if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
}
ctx.lineTo(width,height); ctx.lineTo(0,height); ctx.closePath();
ctx.fillStyle = grad; ctx.shadowBlur = 130; ctx.shadowColor = this.colors[1]; ctx.fill(); ctx.shadowBlur=0;
}
pulse(strength=15){ this.amplitude=this.baseAmplitude+strength; setTimeout(()=>{this.amplitude=this.baseAmplitude;},300);}
}

const ribbons = [
new Ribbon(["rgba(178,102,255,0.55)","rgba(153,102,255,0.5)","rgba(102,204,255,0.35)"], height*0.25,35,0.00045,0,0.016),
new Ribbon(["rgba(204,153,255,0.5)","rgba(178,102,255,0.45)","rgba(51,255,204,0.32)"], height*0.35,40,0.00025,200,0.014),
new Ribbon(["rgba(153,102,255,0.48)","rgba(102,153,255,0.4)","rgba(0,255,255,0.3)"], height*0.45,38,0.00035,500,0.015),
new Ribbon(["rgba(153,102,204,0.45)","rgba(102,102,255,0.38)","rgba(51,255,255,0.3)"], height*0.55,42,0.0005,800,0.017),
new Ribbon(["rgba(102,102,255,0.42)","rgba(51,153,255,0.36)","rgba(102,255,204,0.28)"], height*0.65,40,0.0004,1000,0.013)
];

function animate(time=0){ ctx.clearRect(0,0,width,height); ribbons.forEach(r=>r.draw(time)); requestAnimationFrame(animate);}
animate();
window.addEventListener('resize',()=>{ width=canvas.width=window.innerWidth; height=canvas.height=window.innerHeight; ribbons.forEach((r,i)=>{ r.baseY=height*0.2+i*height*0.1; r.amplitude=35+i*3; r.offsetX=i*300; });});

// ---------------- API ----------------
const apiEndpoints={
upload:"https://vicwyv5xoi.execute-api.us-west-2.amazonaws.com/prod/upload",
buildChron:"https://huy6splpn3.execute-api.us-west-2.amazonaws.com/prod/build",
export:"https://g4r3dpjiu9.execute-api.us-west-2.amazonaws.com/prod/export",
rn:"https://rolkt59qj4.execute-api.us-west-2.amazonaws.com/prod/rn/request"
};

// ---------------- Status & Metrics ----------------
let uploadedCases=5;
const statusSpans=document.querySelectorAll('.status span');
let currentStatusIndex=0;
function updateStatus(index){ statusSpans.forEach((span,i)=>span.classList.toggle('active',i===index)); }
async function updateHighRiskAlerts(){ try{ const response=await fetch("/api/highRiskCount"); const result=await response.json(); if(result.success) document.getElementById('highRisk').innerText=result.count; } catch(err){console.error("Error fetching High-Risk Alerts:",err);} }
updateHighRiskAlerts();

// ---------------- Ocean & Subtitle ----------------
const oceanSound=document.getElementById('oceanSound'); oceanSound.volume=0.7;
document.addEventListener('click',()=>{ oceanSound.play().catch(()=>{}); });
function pulseSound(strength=0.1,duration=400){ const original=oceanSound.volume; oceanSound.volume=Math.min(1,original+strength); setTimeout(()=>{oceanSound.volume=original;},duration); }
const subtitle=document.getElementById('subtitleText');
function pulseSubtitle(){ subtitle.classList.add('pulse'); setTimeout(()=>subtitle.classList.remove('pulse'),300); }

// Helper to show upload status
function showUploadStatus(message, type) {
  const statusEl = document.getElementById('uploadStatus');
  statusEl.textContent = message;
  statusEl.className = `upload-status show ${type}`;
}

function hideUploadStatus() {
  const statusEl = document.getElementById('uploadStatus');
  statusEl.className = 'upload-status';
}

// ---------------- File Upload (FIXED) ----------------
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');

// Button click opens file picker
uploadBtn.addEventListener('click', (e) => {
  e.preventDefault();
  fileInput.click();
});

// File selection triggers upload
fileInput.addEventListener('change', async (event) => {
  const file = event.target.files[0];
  if (!file) {
    hideUploadStatus();
    return;
  }

  try {
    showUploadStatus('Preparing upload...', 'loading');

    // STEP 1: Get presigned URL from Lambda
    const payload = { fileName: file.name };

    const handshakeResponse = await fetch(apiEndpoints.upload, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!handshakeResponse.ok) {
      const errorText = await handshakeResponse.text();
      console.error("Lambda error:", errorText);
      throw new Error(`Lambda returned ${handshakeResponse.status}: ${errorText}`);
    }

    const result = await handshakeResponse.json();
    
    // Accept both uploadUrl and url fields
    const uploadUrl = result.uploadUrl || result.url;
    const fileKey = result.fileKey || result.key;

    if (!uploadUrl || !fileKey) {
      console.error("Lambda response missing uploadUrl/url or fileKey/key:", result);
      throw new Error("Lambda did not return upload credentials");
    }

    console.log("Got presigned URL, uploading file to S3...");
    showUploadStatus('Uploading to S3...', 'loading');

    // STEP 2: Upload file to S3 with presigned URL
    const s3Response = await fetch(uploadUrl, {
      method: "PUT",
      body: file,
      headers: {
        "Content-Type": file.type || "application/pdf",
        "x-amz-server-side-encryption": "AES256"
      }
    });

    if (!s3Response.ok) {
      const errorText = await s3Response.text();
      console.error("S3 error:", errorText);
      throw new Error(`S3 upload failed with ${s3Response.status}`);
    }

    // SUCCESS
    console.log("File uploaded successfully!");
    uploadedCases++;
    const counter = document.getElementById('casesUploaded');
    if (counter) counter.innerText = uploadedCases;

    updateStatus(0);
    showUploadStatus(`✓ ${file.name} uploaded successfully!`, 'success');
    
    // UI effects
    ribbons.forEach(r => r.pulse());
    pulseSubtitle();
    pulseSound(0.15, 500);

    // Auto-hide success message after 4 seconds
    setTimeout(() => hideUploadStatus(), 4000);

  } catch (err) {
    console.error("Upload failed:", err);
    showUploadStatus(`✗ Error: ${err.message}`, 'error');
  } finally {
    // Reset input so same file can be uploaded again
    fileInput.value = "";
  }
});

// ---------------- Build ----------------
async function callBuildChronology(){ try{ currentStatusIndex=1; updateStatus(currentStatusIndex); const response=await fetch(apiEndpoints.buildChron,{method:"POST",headers:{"Content-Type":"application/json"}}); const result=await response.json(); if(result.success){ alert("Chronology built successfully!"); ribbons.forEach(r=>r.pulse()); pulseSubtitle(); pulseSound(0.15,500); updateHighRiskAlerts(); } else alert("Error: "+result.message);} catch(err){ console.error(err); alert("Error calling Build Chronology API."); } }
document.getElementById('buildChronBtn').addEventListener('click',callBuildChronology);

// ---------------- RN ----------------
async function callRNReview(){ try{ currentStatusIndex=2; updateStatus(currentStatusIndex); const response=await fetch(apiEndpoints.rn,{method:"POST",headers:{"Content-Type":"application/json"}}); const result=await response.json(); if(result.success){ alert("RN Review request sent!"); ribbons.forEach(r=>r.pulse()); pulseSubtitle(); pulseSound(0.15,500); } else alert("Error: "+result.message);} catch(err){ console.error(err); alert("Error calling RN Review API."); } }
document.getElementById('rnReviewBtn').addEventListener('click',callRNReview);

// ---------------- Export ----------------
async function callExport(){ try{ currentStatusIndex=3; updateStatus(currentStatusIndex); const response=await fetch(apiEndpoints.export,{method:"POST",headers:{"Content-Type":"application/json"}}); const blob=await response.blob(); const url=window.URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download="exported_files.zip"; document.body.appendChild(a); a.click(); a.remove(); ribbons.forEach(r=>r.pulse()); pulseSubtitle(); pulseSound(0.15,500); } catch(err){ console.error(err); alert("Error exporting files."); } }
document.getElementById('exportBtn').addEventListener('click',callExport);
</script>
</body>
</html>
