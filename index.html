<!DOCTYPE html>
<html>
<head>
<title>HybridAI Dashboard</title>
<style>
body{
margin:0;
font-family:"Segoe UI",sans-serif;
overflow:hidden;
background:#020617;
color:white;
}

/* Aurora Canvas */
#auroraCanvas {
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
z-index:-1;
}

/* Logo with flowing colors */
@keyframes logoFlow {
0% {
background: linear-gradient(270deg, #64c8ff, #4361ee, #7209b7);
background-size: 300% 300%;
background-position: 0% 50%;
}
50% {
background: linear-gradient(270deg, #4361ee, #7209b7, #64c8ff);
background-size: 300% 300%;
background-position: 100% 50%;
}
100% {
background: linear-gradient(270deg, #7209b7, #64c8ff, #4361ee);
background-size: 300% 300%;
background-position: 0% 50%;
}
}

.logoText{
font-size:60px;
font-weight:700;
background: linear-gradient(270deg, #64c8ff, #4361ee, #7209b7);
background-size: 300% 300%;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
text-shadow: 0 0 40px rgba(100,160,255,1);
animation: logoFlow 12s ease infinite;
text-align:center;
}

/* Subtitle flowing colors */
@keyframes subtitleFlow {
0% {
background: linear-gradient(270deg, #4361ee, #7209b7, #64c8ff);
background-size: 300% 300%;
background-position: 0% 50%;
}
50% {
background: linear-gradient(270deg, #7209b7, #64c8ff, #4361ee);
background-size: 300% 300%;
background-position: 100% 50%;
}
100% {
background: linear-gradient(270deg, #64c8ff, #4361ee, #7209b7);
background-size: 300% 300%;
background-position: 0% 50%;
}
}

.subtitle{
font-size:24px;
font-weight:700;
opacity:.9;
margin-top:10px;
background: linear-gradient(270deg, #4361ee, #7209b7, #64c8ff);
background-size: 300% 300%;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
animation: subtitleFlow 15s ease infinite;
transition: transform 0.3s ease, text-shadow 0.3s ease;
text-align:center;
}
.subtitle.pulse{transform: scale(1.1); text-shadow:0 0 25px rgba(255,255,255,1);}

@keyframes subtitle2Flow {
0% {
background: linear-gradient(270deg, #7209b7, #64c8ff, #4361ee);
background-size: 300% 300%;
background-position: 0% 50%;
}
50% {
background: linear-gradient(270deg, #64c8ff, #4361ee, #7209b7);
background-size: 300% 300%;
background-position: 100% 50%;
}
100% {
background: linear-gradient(270deg, #4361ee, #7209b7, #64c8ff);
background-size: 300% 300%;
background-position: 0% 50%;
}
}

.subtitle2{
font-size:24px;
font-weight:700;
margin-top:6px;
background: linear-gradient(270deg, #7209b7, #64c8ff, #4361ee);
background-size: 300% 300%;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
animation: subtitle2Flow 18s ease infinite;
text-align:center;
}

/* Panel */
.panel{
max-width:1100px;
margin:40px auto;
background:rgba(255,255,255,.08);
padding:40px;
border-radius:20px;
backdrop-filter:blur(12px);
box-shadow:0 15px 50px rgba(0,0,0,.6);
position: relative;
z-index:1;
}

/* Cases Dropdown */
.cases-section {
margin-bottom: 30px;
}

.cases-section label {
display: block;
font-size: 16px;
font-weight: 600;
margin-bottom: 10px;
color: #e0f8ff;
text-shadow: 0 0 8px rgba(150,180,255,0.7);
}

#casesDropdown {
width: 100%;
padding: 12px;
border: 2px solid rgba(76,201,240,0.5);
border-radius: 8px;
background: rgba(255,255,255,.08);
color: white;
font-size: 16px;
font-weight: 500;
cursor: pointer;
backdrop-filter: blur(12px);
transition: 0.3s;
}

#casesDropdown:hover {
border-color: rgba(76,201,240,0.9);
box-shadow: 0 0 20px rgba(76,201,240,0.4);
}

#casesDropdown:focus {
outline: none;
border-color: #4cc9f0;
box-shadow: 0 0 30px rgba(76,201,240,0.6);
}

#casesDropdown option {
background: #020617;
color: white;
padding: 10px;
}

/* Buttons */
.button-row{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:40px;
}
button{
flex:1;
padding:18px;
min-width:150px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:600;
cursor:pointer;
background:linear-gradient(90deg,#4361ee,#7209b7);
color:white;
box-shadow:0 0 20px rgba(120,120,255,.7);
transition:.3s;
}
button:hover{transform:translateY(-2px); box-shadow:0 0 35px rgba(150,130,255,1);}

/* Cards */
.cards{display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px;}
.card{
background: rgba(255,255,255,.08);
padding:30px;
border-radius:15px;
backdrop-filter:blur(12px);
box-shadow:0 0 35px rgba(76,201,240,0.45);
text-align:center;
transition:0.3s;
z-index:1;
}
.card h3{
font-size:24px;
color:#e0f8ff;
text-shadow:0 0 12px rgba(150,180,255,0.9);
margin-bottom:20px;
}
.status span{
display:block;
padding:10px;
margin:8px 0;
border-radius:8px;
font-size:18px;
color:#f0f8ff;
opacity:0.95;
transition:.3s;
text-shadow:0 0 8px rgba(180,200,255,0.7);
}
.active{
background:linear-gradient(90deg,#7209b7,#4361ee,#4cc9f0);
color:#ffffff;
box-shadow:0 0 25px rgba(120,120,255,0.9);
opacity:1;
text-shadow:0 0 20px rgba(255,255,255,0.8);
}
.metric{
font-size:50px;
font-weight:700;
text-align:center;
margin-top:10px;
color:#e0f8ff;
text-shadow:0 0 18px rgba(120,150,255,0.7);
}
/* Needs Attention Soft Yellow */
.subtext{
font-size:20px;
font-weight:600;
color:#fff9a3;
text-shadow:0 0 14px rgba(255,240,163,0.8);
margin-top:8px;
}

/* Cases Card Enhancement */
.cases-card-content {
margin-top: 20px;
}

.case-stat {
display: flex;
justify-content: space-between;
align-items: center;
padding: 12px;
margin: 8px 0;
background: rgba(76, 201, 240, 0.1);
border-left: 3px solid rgba(76, 201, 240, 0.6);
border-radius: 6px;
font-size: 14px;
transition: 0.3s;
}

.case-stat:hover {
background: rgba(76, 201, 240, 0.2);
border-left-color: #4cc9f0;
}

.case-stat-label {
color: #b0e0ff;
font-weight: 500;
}

.case-stat-value {
color: #4cc9f0;
font-weight: 700;
font-size: 16px;
}

.progress-bar {
width: 100%;
height: 6px;
background: rgba(76, 201, 240, 0.2);
border-radius: 3px;
margin-top: 15px;
overflow: hidden;
}

.progress-fill {
height: 100%;
background: linear-gradient(90deg, #4cc9f0, #64c8ff);
border-radius: 3px;
width: 60%;
box-shadow: 0 0 10px rgba(76, 201, 240, 0.8);
animation: progressPulse 2s ease-in-out infinite;
}

@keyframes progressPulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.7; }
}

.case-icons {
display: flex;
justify-content: space-around;
margin-top: 15px;
gap: 10px;
}

.case-icon {
flex: 1;
padding: 10px;
background: rgba(76, 201, 240, 0.15);
border-radius: 8px;
text-align: center;
font-size: 12px;
color: #b0e0ff;
transition: 0.3s;
cursor: pointer;
}

.case-icon:hover {
background: rgba(76, 201, 240, 0.3);
box-shadow: 0 0 15px rgba(76, 201, 240, 0.4);
}

.case-icon-emoji {
font-size: 20px;
display: block;
margin-bottom: 5px;
}

/* Upload Status Message */
.upload-status {
display: none;
margin-top: 20px;
padding: 15px;
border-radius: 8px;
text-align: center;
font-weight: 600;
}
.upload-status.show {
display: block;
}
.upload-status.success {
background: rgba(0, 255, 100, 0.2);
color: #00ff64;
}
.upload-status.error {
background: rgba(255, 50, 50, 0.2);
color: #ff3232;
}
.upload-status.loading {
background: rgba(100, 160, 255, 0.2);
color: #64a0ff;
}
</style>
</head>

<canvas id="auroraCanvas"></canvas>

<audio id="oceanSound" autoplay loop>

<div class="header">

<div class="panel">
<!-- Cases Dropdown -->

<script>
// Store attorney ID (hardcoded for now - you'll change this later)
const ATTORNEY_ID = "b821c3a0-50c1-703a-468f-1be8abb49ae0";

// Cases API endpoint
const casesApiUrl = "https://vicwyv5xoi.execute-api.us-west-2.amazonaws.com/prod/cases";

// Load cases on page load
async function loadCases() {
  try {
    console.log("Fetching cases...");
    const response = await fetch(casesApiUrl, {
      method: "GET",
      headers: {
        "x-attorney-id": ATTORNEY_ID,
        "Content-Type": "application/json"
      }
    });

    if (!response.ok) {
      throw new Error(`API returned ${response.status}`);
    }

    const result = await response.json();
    console.log("Cases response:", result);

    if (result.success && result.cases && result.cases.length > 0) {
      const dropdown = document.getElementById("casesDropdown");
      dropdown.innerHTML = '<option value="">-- Select a Case --</option>';
      
      result.cases.forEach(caseItem => {
        const option = document.createElement("option");
        option.value = caseItem.caseId;
        option.textContent = `Case: ${caseItem.caseId} | Firm: ${caseItem.firmId}`;
        dropdown.appendChild(option);
      });

      // Update case statistics
      updateCaseStats(result.cases.length);
    } else {
      const dropdown = document.getElementById("casesDropdown");
      dropdown.innerHTML = '<option value="">No cases found</option>';
    }
  } catch (err) {
    console.error("Error loading cases:", err);
    const dropdown = document.getElementById("casesDropdown");
    dropdown.innerHTML = '<option value="">Error loading cases</option>';
  }
}

// Update case statistics
function updateCaseStats(totalCases) {
  document.getElementById("totalCases").innerText = totalCases;
  const completed = Math.floor(totalCases * 0.6);
  const inProgress = totalCases - completed;
  document.getElementById("completedCases").innerText = completed;
  document.getElementById("inProgressCases").innerText = inProgress;
  
  // Update progress bar width
  const progressPercentage = (completed / totalCases) * 100;
  document.querySelector(".progress-fill").style.width = progressPercentage + "%";
}

// Load cases when page loads
document.addEventListener("DOMContentLoaded", loadCases);

// Update selected case
document.getElementById("casesDropdown").addEventListener("change", (e) => {
  const selectedCaseId = e.target.value;
  if (selectedCaseId) {
    console.log("Selected case:", selectedCaseId);
  }
});

// ============= MESMERIZING AURORA BOREALIS =============
const canvas = document.getElementById("auroraCanvas");
const ctx = canvas.getContext("2d");
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

class AuroraParticle {
  constructor() {
    this.x = Math.random() * width;
    this.y = Math.random() * height * 0.6;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.2;
    this.life = Math.random() * 0.5 + 0.5;
    this.maxLife = this.life;
    this.size = Math.random() * 80 + 20;
    
    const colorScheme = Math.random();
    if (colorScheme < 0.33) {
      this.color = `hsla(200, 100%, 50%, ${this.life * 0.3})`;
    } else if (colorScheme < 0.66) {
      this.color = `hsla(280, 100%, 60%, ${this.life * 0.25})`;
    } else {
      this.color = `hsla(160, 100%, 55%, ${this.life * 0.28})`;
    }
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= 0.003;
  }

  draw() {
    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
    const alpha = this.life / this.maxLife;
    
    if (this.color.includes('200')) {
      gradient.addColorStop(0, `rgba(100, 200, 255, ${alpha * 0.6})`);
      gradient.addColorStop(0.5, `rgba(100, 150, 255, ${alpha * 0.3})`);
      gradient.addColorStop(1, `rgba(100, 150, 255, 0)`);
    } else if (this.color.includes('280')) {
      gradient.addColorStop(0, `rgba(180, 100, 255, ${alpha * 0.5})`);
      gradient.addColorStop(0.5, `rgba(150, 80, 255, ${alpha * 0.25})`);
      gradient.addColorStop(1, `rgba(150, 80, 255, 0)`);
    } else {
      gradient.addColorStop(0, `rgba(100, 255, 200, ${alpha * 0.55})`);
      gradient.addColorStop(0.5, `rgba(80, 220, 180, ${alpha * 0.28})`);
      gradient.addColorStop(1, `rgba(80, 220, 180, 0)`);
    }
    
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

class AuroraWave {
  constructor(startY, colors, speed) {
    this.startY = startY;
    this.colors = colors;
    this.speed = speed;
    this.offset = Math.random() * 1000;
    this.phase = Math.random() * Math.PI * 2;
  }

  draw(time) {
    const gradient = ctx.createLinearGradient(0, this.startY - 200, 0, this.startY + 200);
    this.colors.forEach((color, i) => {
      gradient.addColorStop(i / (this.colors.length - 1), color);
    });

    ctx.beginPath();
    for (let x = 0; x <= width; x += 4) {
      const wave1 = Math.sin((x * 0.005 + time * this.speed + this.offset) + this.phase) * 120;
      const wave2 = Math.sin((x * 0.002 + time * this.speed * 0.5)) * 60;
      const wave3 = Math.cos((x * 0.003 + time * this.speed * 0.3)) * 40;
      const y = this.startY + wave1 + wave2 + wave3;
      
      if (x === 0) {
        ctx.moveTo(x, y);
      } else {
        ctx.lineTo(x, y);
      }
    }
    
    ctx.lineTo(width, height);
    ctx.lineTo(0, height);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.globalAlpha = 0.4;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// Initialize aurora waves with aqua, blue, purple
const auroraWaves = [
  new AuroraWave(height * 0.2, [
    "rgba(100, 200, 255, 0)",
    "rgba(100, 200, 255, 0.6)",
    "rgba(100, 200, 255, 0)"
  ], 0.0003),
  new AuroraWave(height * 0.35, [
    "rgba(150, 100, 255, 0)",
    "rgba(150, 100, 255, 0.5)",
    "rgba(150, 100, 255, 0)"
  ], 0.00025),
  new AuroraWave(height * 0.5, [
    "rgba(100, 255, 200, 0)",
    "rgba(100, 255, 200, 0.55)",
    "rgba(100, 255, 200, 0)"
  ], 0.00035),
  new AuroraWave(height * 0.65, [
    "rgba(100, 180, 255, 0)",
    "rgba(100, 180, 255, 0.45)",
    "rgba(100, 180, 255, 0)"
  ], 0.0004),
];

const particles = [];

function createParticles() {
  for (let i = 0; i < 3; i++) {
    particles.push(new AuroraParticle());
  }
}

function animateAurora(time = 0) {
  ctx.clearRect(0, 0, width, height);
  
  // Draw aurora waves
  auroraWaves.forEach(wave => wave.draw(time));
  
  // Draw and update particles
  particles.forEach((particle, index) => {
    if (particle.life > 0) {
      particle.update();
      particle.draw();
    } else {
      particles.splice(index, 1);
    }
  });
  
  // Create new particles occasionally
  if (Math.random() < 0.1) {
    createParticles();
  }
  
  // Add glow effect to entire canvas
  ctx.shadowBlur = 50;
  ctx.shadowColor = "rgba(100, 200, 255, 0.3)";
  
  requestAnimationFrame(animateAurora);
}

animateAurora();

// Handle window resize
window.addEventListener('resize', () => {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
  auroraWaves.forEach((wave, i) => {
    wave.startY = height * (0.2 + i * 0.15);
  });
});

// ---------------- API ----------------
const apiEndpoints={
upload:"https://vicwyv5xoi.execute-api.us-west-2.amazonaws.com/prod/upload",
buildChron:"https://huy6splpn3.execute-api.us-west-2.amazonaws.com/prod/build",
export:"https://g4r3dpjiu9.execute-api.us-west-2.amazonaws.com/prod/export",
rn:"https://rolkt59qj4.execute-api.us-west-2.amazonaws.com/prod/rn/request"
};

// ---------------- Status & Metrics ----------------
let uploadedCases=5;
const statusSpans=document.querySelectorAll('.status span');
let currentStatusIndex=0;
function updateStatus(index){ statusSpans.forEach((span,i)=>span.classList.toggle('active',i===index)); }
async function updateHighRiskAlerts(){ try{ const response=await fetch("/api/highRiskCount"); const result=await response.json(); if(result.success) document.getElementById('highRisk').innerText=result.count; } catch(err){console.error("Error fetching High-Risk Alerts:",err);} }
updateHighRiskAlerts();

// ---------------- Ocean & Subtitle ----------------
const oceanSound=document.getElementById('oceanSound'); oceanSound.volume=0.7;
document.addEventListener('click',()=>{ oceanSound.play().catch(()=>{}); });
function pulseSound(strength=0.1,duration=400){ const original=oceanSound.volume; oceanSound.volume=Math.min(1,original+strength); setTimeout(()=>{oceanSound.volume=original;},duration); }
const subtitle=document.getElementById('subtitleText');
function pulseSubtitle(){ subtitle.classList.add('pulse'); setTimeout(()=>subtitle.classList.remove('pulse'),300); }

// Helper to show upload status
function showUploadStatus(message, type) {
  const statusEl = document.getElementById('uploadStatus');
  statusEl.textContent = message;
  statusEl.className = `upload-status show ${type}`;
}

function hideUploadStatus() {
  const statusEl = document.getElementById('uploadStatus');
  statusEl.className = 'upload-status';
}

// ---------------- File Upload (FIXED) ----------------
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');

// Button click opens file picker
uploadBtn.addEventListener('click', (e) => {
  e.preventDefault();
  fileInput.click();
});

// File selection triggers upload
fileInput.addEventListener('change', async (event) => {
  const file = event.target.files[0];
  if (!file) {
    hideUploadStatus();
    return;
  }

  try {
    showUploadStatus('Preparing upload...', 'loading');

    // STEP 1: Get presigned URL from Lambda
    const payload = { fileName: file.name };

    const handshakeResponse = await fetch(apiEndpoints.upload, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!handshakeResponse.ok) {
      const errorText = await handshakeResponse.text();
      console.error("Lambda error:", errorText);
      throw new Error(`Lambda returned ${handshakeResponse.status}: ${errorText}`);
    }

    const result = await handshakeResponse.json();
    
    // Accept both uploadUrl and url fields
    const uploadUrl = result.uploadUrl || result.url;
    const fileKey = result.fileKey || result.key;

    if (!uploadUrl || !fileKey) {
      console.error("Lambda response missing uploadUrl/url or fileKey/key:", result);
      throw new Error("Lambda did not return upload credentials");
    }

    console.log("Got presigned URL, uploading file to S3...");
    showUploadStatus('Uploading to S3...', 'loading');

    // STEP 2: Upload file to S3 with presigned URL
    const s3Response = await fetch(uploadUrl, {
      method: "PUT",
      body: file,
      headers: {
        "Content-Type": file.type || "application/pdf",
        "x-amz-server-side-encryption": "AES256"
      }
    });

    if (!s3Response.ok) {
      const errorText = await s3Response.text();
      console.error("S3 error:", errorText);
      throw new Error(`S3 upload failed with ${s3Response.status}`);
    }

    // SUCCESS
    console.log("File uploaded successfully!");
    uploadedCases++;
    const counter = document.getElementById('casesUploaded');
    if (counter) counter.innerText = uploadedCases;

    updateStatus(0);
    showUploadStatus(`✓ ${file.name} uploaded successfully!`, 'success');
    
    // Update case stats
    updateCaseStats(uploadedCases);
    
    // UI effects
    pulseSubtitle();
    pulseSound(0.15, 500);

    // Auto-hide success message after 4 seconds
    setTimeout(() => hideUploadStatus(), 4000);

  } catch (err) {
    console.error("Upload failed:", err);
    showUploadStatus(`✗ Error: ${err.message}`, 'error');
  } finally {
    // Reset input so same file can be uploaded again
    fileInput.value = "";
  }
});

async function callExport(){ try{ currentStatusIndex=3; updateStatus(currentStatusIndex); const response=await fetch(apiEndpoints.export,{method:"POST",headers:{"Content-Type":"application/json"}}); const blob=await response.blob(); const url=window.URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download="exported_files.zip"; document.body.appendChild(a); a.click(); a.remove(); pulseSubtitle(); pulseSound(0.15,500); } catch(err){ console.error(err); alert("Error exporting files."); } }
document.getElementById('exportBtn').addEventListener('click',callExport);
