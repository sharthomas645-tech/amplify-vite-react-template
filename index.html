<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HybridAI - Medical Chronology Builder</title>
    <script src="https://unpkg.com/oidc-client-ts@latest/dist/oidc-client.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", sans-serif;
            background: #020617;
            color: white;
            overflow: hidden;
        }
        #auroraCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }
        .login-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            z-index: 1000;
        }
        .login-logo {
            font-size: 50px;
            font-weight: 700;
            background: linear-gradient(270deg, #64c8ff, #4361ee, #7209b7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        .login-subtitle {
            font-size: 16px;
            color: #b0e0ff;
            margin-top: 10px;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #4361ee, #7209b7);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(120, 120, 255, 0.7);
            transition: 0.3s;
            margin-top: 20px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 35px rgba(150, 130, 255, 1);
        }
        .panel {
            max-width: 1100px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
            position: relative;
            z-index: 1;
        }
        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: linear-gradient(90deg, #ff6b6b, #ee5a6f);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .logout-btn:hover {
            transform: translateY(-2px);
        }
        .logoText {
            font-size: 60px;
            font-weight: 700;
            background: linear-gradient(270deg, #64c8ff, #4361ee, #7209b7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        .subtitle {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-top: 10px;
            color: #e0f8ff;
        }
        .cases-section {
            margin: 30px 0;
        }
        .cases-section label {
            display: block;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #e0f8ff;
        }
        #casesDropdown {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(76, 201, 240, 0.5);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .button-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
        }
        button {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(90deg, #4361ee, #7209b7);
            color: white;
            transition: 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.08);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }
        .metric {
            font-size: 50px;
            font-weight: 700;
            color: #e0f8ff;
            margin-top: 10px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<canvas id="auroraCanvas"></canvas>
<input type="file" id="fileInput" accept=".pdf" style="display:none">

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-container">
    <div class="login-logo">HybridAI</div>
    <div class="login-subtitle">Medical Chronology Builder & Analyzer</div>
    <div class="login-subtitle">We Make It Make Sense</div>
    <button class="login-btn" id="signinBtn">Sign In with Cognito</button>
</div>

<!-- DASHBOARD SCREEN -->
<div id="dashboardScreen" class="hidden">
    <div class="panel">
        <button class="logout-btn" id="logoutBtn">Logout</button>
        
        <div class="logoText">HybridAI</div>
        <div class="subtitle">Medical Chronology Builder & Analyzer</div>
        
        <div class="cases-section">
            <label for="casesDropdown">Select Case:</label>
            <select id="casesDropdown">
                <option value="">Loading cases...</option>
            </select>
        </div>

        <div class="button-row">
            <button id="uploadBtn">Click to Upload PDF</button>
            <button id="buildChronBtn">Build Chronology</button>
            <button id="rnReviewBtn">RN Review Request</button>
            <button id="exportBtn">Export Files</button>
        </div>
        
        <div class="cards">
            <div class="card">
                <h3>Case Status</h3>
                <div id="caseStatus">Uploaded</div>
            </div>
            <div class="card">
                <h3>High-Risk Alerts</h3>
                <div class="metric" id="highRisk">0</div>
            </div>
            <div class="card">
                <h3>Cases Uploaded</h3>
                <div class="metric" id="casesUploaded">0</div>
            </div>
        </div>
    </div>
</div>

<script src="https://sdk.amazonaws.com/js/aws-sdk-2.1201.0.min.js"></script>
<script>
// OIDC Configuration
const userManager = new Oidc.UserManager({
    authority: 'https://cognito-idp.us-west-2.amazonaws.com/us-west-2_O3TpxRglB',
    client_id: '5dm1etldt5tea0olbf4k8r67jh',
    redirect_uri: 'https://hybridaimedlegal.com',
    response_type: 'code',
    scope: 'email openid profile',
    userStore: new Oidc.WebStorageStateStore({ prefix: 'oidc.client' })
});

// Check if user is already logged in
userManager.getUser().then(user => {
    if (user && !user.expired) {
        showDashboard(user);
    } else {
        showLoginScreen();
    }
});

// Handle redirect from Cognito
userManager.signinCallback().then(user => {
    showDashboard(user);
}).catch(err => {
    console.error('Signin callback error:', err);
    showLoginScreen();
});

function showLoginScreen() {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('dashboardScreen').classList.add('hidden');
}

function showDashboard(user) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboardScreen').classList.remove('hidden');
    initializeDashboard();
}

// Sign in button
document.getElementById('signinBtn').addEventListener('click', () => {
    userManager.signinRedirect();
});

// Logout button
document.getElementById('logoutBtn').addEventListener('click', () => {
    userManager.signoutRedirect();
});

// Initialize dashboard
function initializeDashboard() {
    loadCases();
    setupFileUpload();
    setupButtons();
    setupAuroraCanvas();
}

// Load cases
async function loadCases() {
    try {
        const user = await userManager.getUser();
        const response = await fetch('https://vicwyv5xoi.execute-api.us-west-2.amazonaws.com/prod/cases', {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${user.access_token}`,
                'Content-Type': 'application/json'
            }
        });

        const result = await response.json();
        if (result.success && result.cases && result.cases.length > 0) {
            const dropdown = document.getElementById('casesDropdown');
            dropdown.innerHTML = '<option value="">-- Select a Case --</option>';
            result.cases.forEach(caseItem => {
                const option = document.createElement('option');
                option.value = caseItem.caseId;
                option.textContent = `Case: ${caseItem.caseId} | Firm: ${caseItem.firmId}`;
                dropdown.appendChild(option);
            });
        }
    } catch (err) {
        console.error('Error loading cases:', err);
    }
}

// Setup file upload
function setupFileUpload() {
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');

    uploadBtn.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', async (event) => {
        const file = event.target.files[0];
        if (!file) return;

        try {
            const user = await userManager.getUser();
            const payload = { fileName: file.name };

            const handshakeResponse = await fetch('https://vicwyv5xoi.execute-api.us-west-2.amazonaws.com/prod/upload', {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${user.access_token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const result = await handshakeResponse.json();
            const uploadUrl = result.uploadUrl || result.url;

            if (uploadUrl) {
                const s3Response = await fetch(uploadUrl, {
                    method: 'PUT',
                    body: file,
                    headers: { 'Content-Type': file.type || 'application/pdf' }
                });

                if (s3Response.ok) {
                    alert('File uploaded successfully!');
                    loadCases();
                }
            }
        } catch (err) {
            console.error('Upload failed:', err);
            alert('Upload failed');
        }
    });
}

// Setup buttons
function setupButtons() {
    document.getElementById('buildChronBtn').addEventListener('click', async () => {
        try {
            const user = await userManager.getUser();
            const response = await fetch('https://huy6splpn3.execute-api.us-west-2.amazonaws.com/prod/build', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${user.access_token}`,
                    'Content-Type': 'application/json'
                }
            });
            const result = await response.json();
            alert(result.success ? 'Chronology built!' : 'Error building chronology');
        } catch (err) {
            alert('Error');
        }
    });

    document.getElementById('rnReviewBtn').addEventListener('click', async () => {
        try {
            const user = await userManager.getUser();
            const response = await fetch('https://rolkt59qj4.execute-api.us-west-2.amazonaws.com/prod/rn/request', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${user.access_token}`,
                    'Content-Type': 'application/json'
                }
            });
            const result = await response.json();
            alert(result.success ? 'RN Review requested!' : 'Error');
        } catch (err) {
            alert('Error');
        }
    });

    document.getElementById('exportBtn').addEventListener('click', async () => {
        try {
            const user = await userManager.getUser();
            const response = await fetch('https://g4r3dpjiu9.execute-api.us-west-2.amazonaws.com/prod/export', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${user.access_token}`,
                    'Content-Type': 'application/json'
                }
            });
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'exported_files.zip';
            document.body.appendChild(a);
            a.click();
            a.remove();
        } catch (err) {
            alert('Error exporting');
        }
    });
}

// Aurora Canvas
function setupAuroraCanvas() {
    const canvas = document.getElementById('auroraCanvas');
    const ctx = canvas.getContext('2d');
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    class AuroraParticle {
        constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height * 0.6;
            this.vx = (Math.random() - 0.5) * 0.3;
            this.vy = (Math.random() - 0.5) * 0.2;
            this.life = Math.random() * 0.5 + 0.5;
            this.maxLife = this.life;
            this.size = Math.random() * 80 + 20;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= 0.003;
        }

        draw() {
            const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
            const alpha = this.life / this.maxLife;
            gradient.addColorStop(0, `rgba(100, 200, 255, ${alpha * 0.6})`);
            gradient.addColorStop(0.5, `rgba(100, 150, 255, ${alpha * 0.3})`);
            gradient.addColorStop(1, `rgba(100, 150, 255, 0)`);
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    const particles = [];

    function createParticles() {
        for (let i = 0; i < 3; i++) {
            particles.push(new AuroraParticle());
        }
    }

    function animate() {
        ctx.clearRect(0, 0, width, height);
        
        particles.forEach((particle, index) => {
            if (particle.life > 0) {
                particle.update();
                particle.draw();
            } else {
                particles.splice(index, 1);
            }
        });
        
        if (Math.random() < 0.1) {
            createParticles();
        }
        
        requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    });
}
</script>

</body>
</html>
