<!DOCTYPE html>
<html>
<head>
<title>HybridAI Dashboard</title>
<style>
body{
margin:0;
font-family:"Segoe UI",sans-serif;
overflow:hidden;
background:#020617;
color:white;
}

/* Canvas for aurora and water */
#auroraCanvas {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* Header */
.header{
text-align:center;
padding-top:40px;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

.logoH {
width:50px;
height:50px;
background:#0ff;
font-weight:bold;
font-size:36px;
display:flex;
justify-content:center;
align-items:center;
border-radius:8px;
text-shadow:0 0 20px #0ff;
}

.logoText{
font-size:48px;
font-weight:700;
background:linear-gradient(90deg,#4cc9f0,#7209b7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 30px rgba(100,160,255,.9);
}

.subtitle{
font-size:20px;
opacity:.85;
margin-top:6px;
}

/* Main Panel */
.panel{
max-width:1100px;
margin:40px auto;
background:rgba(255,255,255,.05);
padding:40px;
border-radius:20px;
backdrop-filter:blur(18px);
box-shadow:0 15px 50px rgba(0,0,0,.6);
}

/* Buttons */
.button-row{
display:flex;
gap:20px;
margin-bottom:40px;
}

button{
flex:1;
padding:16px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
background:linear-gradient(90deg,#4361ee,#7209b7);
color:white;
box-shadow:0 0 15px rgba(120,120,255,.5);
transition:.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 30px rgba(150,130,255,1);
}

/* Cards */
.cards{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
}

.card{
background:rgba(255,255,255,.05);
padding:25px;
border-radius:15px;
backdrop-filter:blur(10px);
}

.card h3{
color:#9fb7ff;
margin-bottom:15px;
}

/* Case Status */
.status span{
display:block;
padding:6px;
margin:5px 0;
border-radius:6px;
color:#8fb6ff;
}

/* Active Status Glow */
.active{
background:linear-gradient(90deg,#4361ee,#7209b7);
color:white;
box-shadow:0 0 15px rgba(130,130,255,.9);
}

/* Metrics */
.metric{
font-size:40px;
font-weight:700;
text-align:center;
margin-top:10px;
}

.alert{
color:#ff4d6d;
}
</style>
</head>
<body>

<canvas id="auroraCanvas"></canvas>

<div class="header">
<div class="logoH">H</div>
<div>
<div class="logoText">HybridAI</div>
<div class="subtitle">Medical Chronology Builder & Analyzer</div>
</div>
</div>

<div class="panel">

<div class="button-row">
<button id="uploadBtn">Upload PDF</button>
<button id="buildChronBtn">Build Chronology</button>
<button id="rnReviewBtn">RN Review Request</button>
<button id="exportBtn">Export Files</button>
</div>

<div class="cards">

<div class="card">
<h3>Case Status</h3>
<div class="status">
<span class="active">Uploaded</span>
<span>Processing</span>
<span>Under RN Review</span>
<span>Ready for Export</span>
</div>
</div>

<div class="card">
<h3>High-Risk Alerts</h3>
<div class="metric alert" id="highRisk">2</div>
</div>

<div class="card">
<h3>Cases Uploaded</h3>
<div class="metric" id="casesUploaded">5</div>
</div>

</div>
</div>

<script>
// ===== Aurora + Water Canvas =====
const canvas = document.getElementById("auroraCanvas");
const ctx = canvas.getContext("2d");
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

// Ribbons for aurora
const ribbons = [];
for(let i=0;i<6;i++){
ribbons.push({
y: Math.random()*height*0.5,
amplitude: 50 + Math.random()*50,
wavelength: 200 + Math.random()*200,
speed: 0.0005 + Math.random()*0.0005,
phase: Math.random()*Math.PI*2,
color1: `rgba(76,201,240,0.15)`,
color2: `rgba(114,9,183,0.15)`,
color3: `rgba(0,255,204,0.15)`
});
}

let pulse = 0;

// Draw aurora ribbons and reflection
function drawAurora(){
ctx.clearRect(0,0,width,height);

// Draw aurora ribbons
ribbons.forEach(r=>{
ctx.beginPath();
for(let x=0;x<width;x++){
let y = r.y + Math.sin((x/r.wavelength)+r.phase + Date.now()*r.speed)*r.amplitude;
if(x===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);
}
const grad = ctx.createLinearGradient(0,r.y,0,r.y+150);
grad.addColorStop(0,r.color1.replace("0.15",0.15+0.2*pulse));
grad.addColorStop(0.5,r.color2.replace("0.15",0.15+0.2*pulse));
grad.addColorStop(1,r.color3.replace("0.15",0.15+0.2*pulse));
ctx.strokeStyle = grad;
ctx.lineWidth = 60;
ctx.lineCap = 'round';
ctx.stroke();

// Draw reflected ribbon
ctx.beginPath();
for(let x=0;x<width;x++){
let y = height*0.75 + (r.y + Math.sin((x/r.wavelength)+r.phase + Date.now()*r.speed)*r.amplitude)*0.3;
if(x===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);
}
const gradRef = ctx.createLinearGradient(0,height*0.75,0,height);
gradRef.addColorStop(0,r.color1.replace("0.15",0.05+0.1*pulse));
gradRef.addColorStop(0.5,r.color2.replace("0.15",0.05+0.1*pulse));
gradRef.addColorStop(1,r.color3.replace("0.15",0.05+0.1*pulse));
ctx.strokeStyle = gradRef;
ctx.lineWidth = 60;
ctx.lineCap = 'round';
ctx.stroke();
});

// Reduce pulse gradually
pulse *= 0.95;

requestAnimationFrame(drawAurora);
}

drawAurora();

// Resize canvas
window.addEventListener('resize', ()=>{
width = canvas.width = window.innerWidth;
height = canvas.height = window.innerHeight;
});

// ===== Buttons logic =====
let uploadedCases = 5;
function handleClick(action){
pulse = 1; // trigger gentle aurora pulse
switch(action){
case 'upload':
uploadedCases++;
document.getElementById('casesUploaded').innerText = uploadedCases;
alert('PDF uploaded! Total: '+uploadedCases);
break;
case 'chron':
alert('Chronology built!');
break;
case 'rn':
alert('RN Review Request sent!');
break;
case 'export':
alert('Files ready for export!');
break;
}
}

['uploadBtn','buildChronBtn','rnReviewBtn','exportBtn'].forEach(id=>{
document.getElementById(id).addEventListener('click', ()=>{
handleClick(id);
});
});
</script>
</body>
</html>
