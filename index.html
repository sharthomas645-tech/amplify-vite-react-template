<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HybridAI Dashboard</title>
<style>
body, html {
margin: 0;
overflow: hidden;
height: 100%;
font-family: 'Arial', sans-serif;
background: black;
color: white;
}

#header {
position: absolute;
top: 20px;
left: 20px;
display: flex;
align-items: center;
font-size: 36px;
z-index: 10;
font-weight: bold;
}

#header .logo {
width: 50px;
height: 50px;
margin-right: 10px;
}

#controls {
position: absolute;
top: 20px;
right: 20px;
display: flex;
flex-direction: column;
gap: 10px;
z-index: 10;
}

#controls button {
font-size: 16px;
padding: 6px 12px;
border-radius: 5px;
border: none;
cursor: pointer;
}

#controls label {
display: flex;
flex-direction: column;
font-size: 14px;
}

#caseCount {
margin-top: 10px;
font-weight: bold;
}
</style>
</head>
<body>

<div id="header">
<canvas class="logo" id="logoCanvas"></canvas>
HybridAI
</div>

<div id="controls">
<button id="uploadBtn">Upload PDF</button>
<button id="buildChronBtn">Build Chronology</button>
<button id="rnReviewBtn">RN Review Request</button>
<button id="readyExportBtn">Ready for Export</button>
<button id="caseStatusBtn">Case Status</button>
<button id="highRiskBtn">High-Risk flagged</button>
<label>Number of uploaded cases: <span id="caseCount">0</span></label>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r155/three.min.js"></script>
<script>

// ===== Aurora Scene Setup =====
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 2;

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let geometry = new THREE.PlaneGeometry(4, 4, 128, 128);

let uniforms = {
time: { value: 0.0 },
intensity: { value: 1.5 },
style: { value: 0 } // 0: ribbons
};

let material = new THREE.ShaderMaterial({
uniforms: uniforms,
vertexShader: `
varying vec2 vUv;
void main() {
vUv = uv;
gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
}
`,
fragmentShader: `
uniform float time;
uniform float intensity;
uniform float style;
varying vec2 vUv;

float rand(vec2 co){
return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453);
}

float noise(vec2 st){
vec2 i = floor(st);
vec2 f = fract(st);
float a = rand(i);
float b = rand(i + vec2(1.0,0.0));
float c = rand(i + vec2(0.0,1.0));
float d = rand(i + vec2(1.0,1.0));
vec2 u = f*f*(3.0-2.0*f);
return mix(a,b,u.x) + (c-a)*u.y*(1.0-u.x) + (d-b)*u.x*u.y;
}

void main() {
vec2 uv = vUv;
float n = noise(vec2(uv.x*3.0, uv.y*0.5 + time*0.2));
vec3 color = mix(vec3(0.0,0.8,0.3), vec3(0.8,0.0,1.0), n);
color *= intensity;
gl_FragColor = vec4(color,1.0);
}
`
});

let plane = new THREE.Mesh(geometry, material);
scene.add(plane);

let animationId;
function animate(){
animationId = requestAnimationFrame(animate);
uniforms.time.value += 0.02;
renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', ()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

// ===== Logo H =====
let logoCanvas = document.getElementById('logoCanvas');
logoCanvas.width = 50;
logoCanvas.height = 50;
let ctx = logoCanvas.getContext('2d');

function drawLogo(){
ctx.clearRect(0,0,50,50);
ctx.fillStyle = '#0ff';
ctx.strokeStyle = '#0ff';
ctx.lineWidth = 6;
ctx.beginPath();
ctx.moveTo(10,40);
ctx.lineTo(10,10);
ctx.lineTo(20,10);
ctx.lineTo(20,25);
ctx.lineTo(30,25);
ctx.lineTo(30,10);
ctx.lineTo(40,10);
ctx.lineTo(40,40);
ctx.lineTo(30,40);
ctx.lineTo(30,28);
ctx.lineTo(20,28);
ctx.lineTo(20,40);
ctx.closePath();
ctx.fill();
ctx.stroke();
}
drawLogo();

// ===== Button Logic =====
let uploadedCases = 0;

document.getElementById('uploadBtn').onclick = ()=>{
uploadedCases += 1;
document.getElementById('caseCount').innerText = uploadedCases;
alert('PDF uploaded! Total: ' + uploadedCases);
};

document.getElementById('buildChronBtn').onclick = ()=>{
alert('Chronology built!');
};

document.getElementById('rnReviewBtn').onclick = ()=>{
alert('RN Review Request sent!');
};

document.getElementById('readyExportBtn').onclick = ()=>{
alert('Ready for Export!');
};

document.getElementById('caseStatusBtn').onclick = ()=>{
alert('Case Status displayed!');
};

document.getElementById('highRiskBtn').onclick = ()=>{
alert('High-Risk flagged!');
};

</script>
</body>
</html>
