<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 120" width="260" height="120">
  <defs>
    <!-- Pink/magenta gradient for left ribbon -->
    <linearGradient id="hLeftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97cc8"/>
      <stop offset="50%" stop-color="#e84a9a"/>
      <stop offset="100%" stop-color="#d946a6"/>
    </linearGradient>
    <!-- Cyan gradient for right ribbon -->
    <linearGradient id="hRightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="hGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- H LOGO MARK (left side, 120x120 viewport scaled to ~100px) -->
  <g transform="translate(0,0) scale(0.833)">
    <!-- Left ribbon (pink/magenta) -->
    <path d="M 25 10 Q 28 20 30 40 Q 32 60 30 80 Q 28 95 25 105 Q 35 100 38 80 Q 40 60 38 40 Q 36 20 35 10 Z"
          fill="url(#hLeftGrad)" filter="url(#hGlow)" opacity="0.95"/>
    <path d="M 30 15 Q 32 25 33 45 Q 34 65 33 80 Q 32 90 30 100 Q 34 95 36 75 Q 37 55 36 35 Q 35 20 33 15 Z"
          fill="#f9a8d4" opacity="0.5"/>

    <!-- Crossbar -->
    <path d="M 38 52 Q 57 48 82 52 Q 57 56 38 56 Z"
          fill="url(#hLeftGrad)" filter="url(#hGlow)" opacity="0.9"/>
    <path d="M 38 54 Q 57 50 82 54 Q 57 58 38 58 Z"
          fill="url(#hRightGrad)" filter="url(#hGlow)" opacity="0.9"/>

    <!-- Right ribbon (cyan) -->
    <path d="M 95 10 Q 92 20 90 40 Q 88 60 90 80 Q 92 95 95 105 Q 85 100 82 80 Q 80 60 82 40 Q 84 20 85 10 Z"
          fill="url(#hRightGrad)" filter="url(#hGlow)" opacity="0.95"/>
    <path d="M 90 15 Q 88 25 87 45 Q 86 65 87 80 Q 88 90 90 100 Q 86 95 84 75 Q 83 55 84 35 Q 85 20 87 15 Z"
          fill="#a5f3fc" opacity="0.5"/>
  </g>

  <!-- HYBRIDAI text -->
  <text x="105" y="58" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="900" letter-spacing="-1" fill="url(#hLeftGrad)" filter="url(#hGlow)">Hybrid</text>
  <text x="105" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="2" fill="url(#hRightGrad)" filter="url(#hGlow)">AI</text>
</svg>
